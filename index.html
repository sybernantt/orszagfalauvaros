<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ország-Város</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=DM+Sans:wght@400;500&display=swap');

  :root {
    --bg: #0e0e14;
    --surface: #16161f;
    --surface2: #1e1e2a;
    --border: #2a2a3a;
    --accent: #7c6af7;
    --accent2: #f76a8a;
    --text: #f0eeff;
    --muted: #8888aa;
    --green: #4ade80;
    --amber: #fbbf24;
    --red: #f87171;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(1.4rem, 5vw, 2.2rem);
    font-weight: 900;
    letter-spacing: -1px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
    margin-bottom: 0.25rem;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.85rem;
    text-align: center;
    margin-bottom: 2rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    width: 100%;
    max-width: 420px;
  }

  .card-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    padding: 0.75rem 1rem;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
  }

  input[type="text"]::placeholder { color: var(--muted); }

  .btn {
    width: 100%;
    padding: 0.85rem 1rem;
    border-radius: 10px;
    border: none;
    font-family: 'Unbounded', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }

  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #9b6af7);
    color: white;
    margin-top: 0.75rem;
  }

  .btn-secondary {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    margin-top: 0.5rem;
  }

  .btn-danger {
    background: linear-gradient(135deg, var(--accent2), #f76a6a);
    color: white;
    margin-top: 0.75rem;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin: 1.25rem 0;
    color: var(--muted);
    font-size: 0.8rem;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .screen { display: none; width: 100%; max-width: 420px; }
  .screen.active { display: flex; flex-direction: column; align-items: center; gap: 1rem; }

  .room-code {
    font-family: 'Unbounded', sans-serif;
    font-size: 2.5rem;
    font-weight: 900;
    letter-spacing: 8px;
    color: var(--accent);
    text-align: center;
    margin: 0.5rem 0;
  }

  .player-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    width: 100%;
  }

  .player-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.65rem 1rem;
    background: var(--surface2);
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  .player-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
  }

  .player-dot.waiting { background: var(--amber); }

  .player-name { font-weight: 500; flex: 1; }
  .player-score {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.8rem;
    color: var(--accent);
  }

  .letter-display {
    font-family: 'Unbounded', sans-serif;
    font-size: 5rem;
    font-weight: 900;
    color: var(--accent);
    text-align: center;
    line-height: 1;
    text-shadow: 0 0 40px rgba(124, 106, 247, 0.4);
  }

  .categories-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
    width: 100%;
  }

  .category-input-wrap {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }

  .category-label {
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .category-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    padding: 0.6rem 0.75rem;
    outline: none;
    width: 100%;
    transition: border-color 0.2s;
  }

  .category-input:focus { border-color: var(--accent); }
  .category-input.valid { border-color: var(--green); }
  .category-input.invalid { border-color: var(--red); }

  .timer-bar-wrap {
    width: 100%;
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }

  .timer-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 3px;
    transition: width 1s linear;
  }

  .timer-text {
    font-family: 'Unbounded', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    text-align: center;
    color: var(--text);
  }

  .status-msg {
    font-size: 0.85rem;
    color: var(--muted);
    text-align: center;
  }

  .status-msg.green { color: var(--green); }
  .status-msg.red { color: var(--red); }
  .status-msg.amber { color: var(--amber); }

  .results-list {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    width: 100%;
  }

  .result-cat {
    background: var(--surface2);
    border-radius: 10px;
    padding: 0.75rem 1rem;
    border: 1px solid var(--border);
  }

  .result-cat-name {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 0.4rem;
  }

  .result-answers {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
  }

  .result-answer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.9rem;
  }

  .result-answer .name { color: var(--muted); font-size: 0.8rem; }

  .pts {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.75rem;
    padding: 2px 8px;
    border-radius: 6px;
    font-weight: 700;
  }

  .pts.full { background: rgba(74, 222, 128, 0.15); color: var(--green); }
  .pts.half { background: rgba(251, 191, 36, 0.15); color: var(--amber); }
  .pts.zero { background: rgba(248, 113, 113, 0.15); color: var(--red); }

  .round-info {
    font-size: 0.8rem;
    color: var(--muted);
    text-align: center;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 1rem auto;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .final-podium {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    width: 100%;
  }

  .podium-item {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.85rem 1rem;
    border-radius: 12px;
    border: 1px solid var(--border);
  }

  .podium-item.first {
    background: rgba(251, 191, 36, 0.1);
    border-color: rgba(251, 191, 36, 0.3);
  }

  .podium-rank {
    font-family: 'Unbounded', sans-serif;
    font-size: 1.2rem;
    font-weight: 900;
    width: 28px;
    text-align: center;
  }

  .podium-item.first .podium-rank { color: var(--amber); }

  .podium-score {
    font-family: 'Unbounded', sans-serif;
    font-size: 1rem;
    color: var(--accent);
    margin-left: auto;
  }

  .error-msg {
    background: rgba(248, 113, 113, 0.1);
    border: 1px solid rgba(248, 113, 113, 0.3);
    border-radius: 8px;
    padding: 0.6rem 0.9rem;
    font-size: 0.85rem;
    color: var(--red);
    text-align: center;
    display: none;
  }

  .error-msg.show { display: block; }

  .stop-btn {
    background: linear-gradient(135deg, var(--accent2), #f76a6a);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'Unbounded', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 0.75rem 2rem;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    width: 100%;
    margin-top: 0.5rem;
  }

  .stop-btn:active { transform: scale(0.97); }
  .stop-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .info-box {
    background: rgba(124, 106, 247, 0.08);
    border: 1px solid rgba(124, 106, 247, 0.2);
    border-radius: 10px;
    padding: 0.75rem 1rem;
    font-size: 0.82rem;
    color: var(--muted);
    line-height: 1.5;
    width: 100%;
  }

  .info-box strong { color: var(--accent); }
</style>
</head>
<body>

<!-- MENU -->
<div id="menuScreen" class="screen active">
  <h1>Ország–Város</h1>
  <p class="subtitle">Két játékos – valós idő – egy link</p>
  <p style="font-family:'Unbounded',sans-serif;font-size:0.65rem;color:var(--border);margin-top:-1.25rem">v1.1.2</p>
  <div class="card">
    <div class="card-title">Beceneved</div>
    <input type="text" id="playerName" placeholder="pl. Dori" maxlength="16">
  </div>
  <div class="card" style="margin-top:0">
    <div class="card-title">Új szoba</div>
    <button class="btn btn-primary" onclick="createRoom()">🎮 Szoba létrehozása</button>
  </div>
  <div class="card" style="margin-top:0">
    <div class="card-title">Csatlakozás</div>
    <input type="text" id="joinCode" placeholder="Szobakód (pl. A7K2)" maxlength="4" style="text-transform:uppercase">
    <button class="btn btn-secondary" onclick="joinRoom()">→ Csatlakozás</button>
  </div>
  <div class="card" style="margin-top:0">
    <div class="card-title">⚙️ Gemini API kulcs (szóellenőrzéshez)</div>
    <input type="password" id="geminiKey" placeholder="Illeszd be az API kulcsot..." autocomplete="off">
    <button class="btn btn-secondary" onclick="saveApiKey()" style="margin-top:0.5rem">💾 Mentés</button>
    <div id="apiKeyStatus" style="font-size:0.8rem;color:var(--muted);margin-top:0.4rem;text-align:center"></div>
  </div>
  <div id="menuError" class="error-msg"></div>
</div>

<!-- LOBBY -->
<div id="lobbyScreen" class="screen">
  <h1>Ország–Város</h1>
  <div class="card">
    <div class="card-title">Szobakód – küldd el a párodnaknak!</div>
    <div class="room-code" id="lobbyCode">----</div>
    <div class="status-msg" id="lobbyStatus">Várakozás a másik játékosra...</div>
  </div>
  <div class="card" style="margin-top:0">
    <div class="card-title">Játékosok</div>
    <div class="player-list" id="lobbyPlayers"></div>
  </div>
  <div id="lobbyStartBtn" style="width:100%;display:none">
    <button class="btn btn-primary" onclick="startGame()">▶ Játék indítása</button>
  </div>
  <button class="btn btn-secondary" style="max-width:420px;margin-top:0.25rem" onclick="leaveRoom()">← Kilépés</button>
  <div id="lobbyError" class="error-msg"></div>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen">
  <div class="letter-display" id="gameLetter">?</div>
  <div class="round-info" id="gameRound">1. kör</div>
  <div class="timer-bar-wrap" style="max-width:420px;width:100%">
    <div class="timer-bar" id="timerBar" style="width:100%"></div>
  </div>
  <div class="timer-text" id="timerText">60</div>
  <div class="card" style="width:100%;max-width:420px">
    <div class="categories-grid" id="categoriesGrid"></div>
  </div>
  <button class="stop-btn" id="stopBtn" onclick="stopRound()">⏹ STOP!</button>
  <div class="status-msg" id="gameStatus"></div>
  <div id="gameError" class="error-msg"></div>
</div>

<!-- RESULTS -->
<div id="resultsScreen" class="screen">
  <h1>Eredmények</h1>
  <div class="card" style="width:100%;max-width:420px">
    <div class="player-list" id="resultsScores"></div>
  </div>
  <div class="card" style="width:100%;max-width:420px;margin-top:0">
    <div class="card-title" id="resultsRoundTitle">Kör részletei</div>
    <div class="results-list" id="resultsList"></div>
  </div>
  <div id="resultsActions" style="width:100%;max-width:420px;display:flex;flex-direction:column;gap:0.5rem"></div>
</div>

<!-- FINAL -->
<div id="finalScreen" class="screen">
  <h1>🏆 Vége!</h1>
  <div class="card" style="width:100%;max-width:420px">
    <div class="card-title">Végeredmény</div>
    <div class="final-podium" id="finalPodium"></div>
  </div>
  <button class="btn btn-primary" style="max-width:420px" onclick="returnToMenu()">↩ Főmenü</button>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, get, update, onValue, off, push, remove, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ─── FIREBASE CONFIG ─────────────────────────────────────────────────────────
// FONTOS: Cseréld ki a saját Firebase projekted adataira!
const firebaseConfig = {
  apiKey: "AIzaSyAdEOFGQCi2ypIUTpcV-8xmT5e6EPTvl6c",
  authDomain: "orszag-varos-cb786.firebaseapp.com",
  databaseURL: "https://orszag-varos-cb786-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "orszag-varos-cb786",
  storageBucket: "orszag-varos-cb786.firebasestorage.app",
  messagingSenderId: "510017965939",
  appId: "1:510017965939:web:3c4b1e517273594b6a7f06"
};
// ─────────────────────────────────────────────────────────────────────────────

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const CATEGORIES = ['Ország', 'Város', 'Növény', 'Állat', 'Foglalkozás', 'Étel'];
const LETTERS = 'ABCDEÉFGHIJKLMNOPRSTUVZ'.split('');
let usedLetters = [];

function getNextLetter(usedHistory) {
  const recent = usedHistory || [];
  const available = LETTERS.filter(l => !recent.includes(l));
  const pool = available.length > 0 ? available : LETTERS;
  return pool[Math.floor(Math.random() * pool.length)];
}
const MAX_ROUNDS = 5;
const ROUND_TIME = 60;

let myId = null;
let myName = '';
let roomCode = null;
let roomRef = null;
let isHost = false;
let roundTimer = null;
let listeners = [];
let gameState = null;

function uid() {
  return Math.random().toString(36).slice(2, 10);
}

function genCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for (let i = 0; i < 4; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showError(containerId, msg) {
  const el = document.getElementById(containerId);
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function clearListeners() {
  listeners.forEach(({ r, fn }) => off(r, 'value', fn));
  listeners = [];
}

function listen(r, fn) {
  onValue(r, fn);
  listeners.push({ r, fn });
}

// ─── MENU ─────────────────────────────────────────────────────────────────────

window.createRoom = async function() {
  myName = document.getElementById('playerName').value.trim();
  if (!myName) { showError('menuError', 'Adj meg egy becenevet!'); return; }

  myId = uid();
  isHost = true;
  roomCode = genCode();
  roomRef = ref(db, 'rooms/' + roomCode);

  const existingSnap = await get(roomRef);
  if (existingSnap.exists()) { roomCode = genCode(); roomRef = ref(db, 'rooms/' + roomCode); }

  await set(roomRef, {
    host: myId,
    status: 'lobby',
    round: 0,
    scores: { [myId]: 0 },
    players: { [myId]: { name: myName, online: true } },
    createdAt: serverTimestamp()
  });

  enterLobby();
};

window.joinRoom = async function() {
  myName = document.getElementById('playerName').value.trim();
  const code = document.getElementById('joinCode').value.trim().toUpperCase();
  if (!myName) { showError('menuError', 'Adj meg egy becenevet!'); return; }
  if (code.length !== 4) { showError('menuError', 'Érvénytelen szobakód!'); return; }

  roomCode = code;
  roomRef = ref(db, 'rooms/' + roomCode);

  const snap = await get(roomRef);
  if (!snap.exists()) { showError('menuError', 'Nem létezik ilyen szoba!'); return; }
  const room = snap.val();
  const players = room.players || {};

  // Visszacsatlakozás: ha ugyanolyan névvel jött vissza
  const existingEntry = Object.entries(players).find(([id, p]) => p.name === myName);
  if (existingEntry) {
    myId = existingEntry[0];
    isHost = room.host === myId;
    await update(roomRef, { [`players/${myId}/online`]: true });
    if (room.status === 'playing') {
      clearListeners();
      enterGame(room);
    } else if (room.status === 'results') {
      clearListeners();
      showResults(room);
    } else {
      enterLobby();
    }
    return;
  }

  if (room.status !== 'lobby') { showError('menuError', 'A játék már elkezdődött!'); return; }
  if (Object.keys(players).length >= 2) { showError('menuError', 'A szoba már tele van!'); return; }

  myId = uid();
  isHost = false;

  await update(roomRef, {
    [`players/${myId}`]: { name: myName, online: true },
    [`scores/${myId}`]: 0
  });

  enterLobby();
};

function enterLobby() {
  document.getElementById('lobbyCode').textContent = roomCode;
  showScreen('lobbyScreen');

  const fn = (snap) => {
    if (!snap.exists()) { leaveRoom(); return; }
    const room = snap.val();
    gameState = room;
    const players = room.players || {};
    const count = Object.keys(players).length;

    document.getElementById('lobbyStatus').textContent =
      count < 2 ? 'Várakozás a másik játékosra...' : 'Mindenki megérkezett! ✓';

    const list = document.getElementById('lobbyPlayers');
    list.innerHTML = '';
    Object.entries(players).forEach(([id, p]) => {
      const div = document.createElement('div');
      div.className = 'player-item';
      div.innerHTML = `<div class="player-dot ${count < 2 && id !== myId ? 'waiting' : ''}"></div>
        <span class="player-name">${p.name}${id === myId ? ' (te)' : ''}</span>
        <span class="player-score">${room.scores?.[id] ?? 0} pt</span>`;
      list.appendChild(div);
    });

    const startBtn = document.getElementById('lobbyStartBtn');
    startBtn.style.display = (count >= 2 && isHost) ? 'block' : 'none';

    if (room.status === 'playing') {
      clearListeners();
      enterGame(room);
    }
  };

  listen(roomRef, fn);
}

window.leaveRoom = async function() {
  clearListeners();
  if (roomRef && myId) {
    const snap = await get(roomRef);
    if (snap.exists()) {
      const room = snap.val();
      if (room.host === myId) {
        await remove(roomRef);
      } else {
        await update(roomRef, { [`players/${myId}`]: null, [`scores/${myId}`]: null });
      }
    }
  }
  roomRef = null; roomCode = null; isHost = false;
  showScreen('menuScreen');
};

// ─── START GAME ───────────────────────────────────────────────────────────────

window.startGame = async function() {
  if (!isHost) return;
  const letter = getNextLetter([]);
  usedLetters = [letter];
  const startTime = Date.now() + 1000;

  const newRoom = {
    host: myId,
    status: 'playing',
    round: 1,
    letter,
    startTime,
    stopped: null,
    stoppedBy: null,
    answers: null,
    roundResults: null,
    usedLetters,
    scores: gameState?.scores || { [myId]: 0 },
    players: gameState?.players || {}
  };

  await update(roomRef, {
    status: 'playing',
    round: 1,
    letter,
    startTime,
    stopped: null,
    stoppedBy: null,
    answers: null,
    roundResults: null,
    usedLetters
  });

  clearListeners();
  enterGame(newRoom);
};

// ─── GAME SCREEN ──────────────────────────────────────────────────────────────

function enterGame(room) {
  showScreen('gameScreen');
  buildCategoryInputs();

  // Reset stop gomb és status minden kör elején
  document.getElementById('stopBtn').disabled = false;
  document.getElementById('gameStatus').textContent = '';
  document.getElementById('gameStatus').className = 'status-msg';

  document.getElementById('gameRound').textContent = `${room.round}. kör / ${MAX_ROUNDS}`;
  document.getElementById('gameLetter').textContent = room.letter;

  const elapsed = Math.floor((Date.now() - room.startTime) / 1000);
  let remaining = Math.max(0, ROUND_TIME - elapsed);
  updateTimerDisplay(remaining);
  startCountdown(remaining, room);

  let scoringStarted = false;
  const fn = (snap) => {
    if (!snap.exists()) return;
    const r = snap.val();
    gameState = r;

    if (r.stopped && !scoringStarted) {
      scoringStarted = true;
      clearInterval(roundTimer);
      document.getElementById('stopBtn').disabled = true;
      document.getElementById('gameStatus').textContent = `${r.stoppedBy === myId ? 'Te' : (r.players?.[r.stoppedBy]?.name ?? '?')} nyomott STOP-ot! Várakozás...`;
      document.getElementById('gameStatus').className = 'status-msg amber';
      lockInputs();
      setTimeout(async () => {
        if (isHost) {
          const fresh = await get(roomRef);
          if (fresh.exists()) collectAndScore(fresh.val());
        }
      }, 2500);
    }

    if (r.status === 'results') {
      clearListeners();
      showResults(r);
    }

    if (r.status === 'final') {
      clearListeners();
      showFinal(r);
    }
  };

  listen(roomRef, fn);
}

function buildCategoryInputs() {
  const grid = document.getElementById('categoriesGrid');
  grid.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const wrap = document.createElement('div');
    wrap.className = 'category-input-wrap';
    wrap.innerHTML = `<label class="category-label">${cat}</label>
      <input class="category-input" type="text" data-cat="${cat}" placeholder="${cat[0]}...">`;
    grid.appendChild(wrap);
  });
}

function lockInputs() {
  document.querySelectorAll('.category-input').forEach(i => i.disabled = true);
}

function startCountdown(remaining, room) {
  updateTimerDisplay(remaining);
  clearInterval(roundTimer);
  roundTimer = setInterval(() => {
    remaining--;
    updateTimerDisplay(remaining);
    if (remaining <= 0) {
      clearInterval(roundTimer);
      if (isHost && !gameState?.stopped) {
        triggerStop('time');
      }
    }
  }, 1000);
}

function updateTimerDisplay(secs) {
  document.getElementById('timerText').textContent = secs;
  document.getElementById('timerBar').style.width = (secs / ROUND_TIME * 100) + '%';
  if (secs <= 10) document.getElementById('timerText').style.color = 'var(--red)';
  else document.getElementById('timerText').style.color = 'var(--text)';
}

window.stopRound = async function() {
  document.getElementById('stopBtn').disabled = true;
  await update(roomRef, { stopped: true, stoppedBy: myId });
};

async function triggerStop(who) {
  await update(roomRef, { stopped: true, stoppedBy: who });
}

// ─── GEMINI SZÓELLENŐRZÉS (BATCH) ───────────────────────────────────────────

function getApiKey() {
  return localStorage.getItem('gemini_api_key') || '';
}

window.saveApiKey = function() {
  const key = document.getElementById('geminiKey').value.trim();
  if (!key) {
    document.getElementById('apiKeyStatus').textContent = '❌ Üres kulcs!';
    return;
  }
  localStorage.setItem('gemini_api_key', key);
  document.getElementById('apiKeyStatus').textContent = '✅ Elmentve!';
  document.getElementById('geminiKey').value = '';
  setTimeout(() => { document.getElementById('apiKeyStatus').textContent = '🔑 API kulcs mentve'; }, 2000);
};

// Egy kérésben ellenőriz minden választ
async function checkAllWords(toCheck, letter) {
  const apiKey = getApiKey();

  // Ha nincs API kulcs, csak betűt ellenőrzünk
  if (!apiKey) {
    const results = {};
    toCheck.forEach(({ pid, cat, ans }) => {
      const norm = ans.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
      const normLetter = letter.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
      results[`${pid}__${cat}`] = norm[0] === normLetter
        ? { valid: true }
        : { valid: false, reason: 'rossz betű' };
    });
    return results;
  }

  // Összeállítjuk a listát az AI-nak
  const items = toCheck.map((item, i) =>
    `${i + 1}. Kategória: ${item.cat} | Válasz: "${item.ans}"`
  ).join('\n');

  const prompt = `Te egy szigorú magyar Ország-Város játékvezető vagy.
Az adott betű ebben a körben: ${letter}

Ellenőrizd az alábbi válaszokat és döntsd el mindegyikről hogy IGEN (érvényes) vagy NEM (érvénytelen):

Szabályok:
- A válasznak VALÓDI, LÉTEZŐ szónak/névnek kell lennie (nem kitalált, nem random betűsor)
- Pontosan a megadott kategóriába kell illeznie (Ország = létező ország, Város = valódi város, Állat = valódi állatfaj, Növény = valódi növény, Foglalkozás = valódi foglalkozás, Étel = valódi étel)
- ${letter} betűvel kell kezdődnie (ékezet nélküli változat is elfogadható, pl. "Siklo" = "Sikló")
- Ha random betűsor vagy értelmetlen szó → NEM

Válaszok:
${items}

Válaszolj CSAK így, minden sorban egy szám és IGEN vagy NEM, semmi más:
1. IGEN
2. NEM
stb.`;

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-8b-latest:generateContent?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { maxOutputTokens: 200, temperature: 0 }
      })
    });

    if (!res.ok) {
      // API hiba → mindenkit elfogadunk
      const fallback = {};
      toCheck.forEach(({ pid, cat }) => { fallback[`${pid}__${cat}`] = { valid: true }; });
      return fallback;
    }

    const data = await res.json();
    const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';
    console.log('Gemini válasz:', text);
    const lines = text.trim().split('\n');

    const results = {};
    toCheck.forEach((item, i) => {
      const key = `${item.pid}__${item.cat}`;
      const line = lines[i] || '';
      const isValid = line.toUpperCase().includes('IGEN');
      results[key] = isValid ? { valid: true } : { valid: false, reason: 'érvénytelen válasz' };
    });
    return results;
  } catch {
    // Hálózati hiba → mindenkit elfogadunk
    const fallback = {};
    toCheck.forEach(({ pid, cat }) => { fallback[`${pid}__${cat}`] = { valid: true }; });
    return fallback;
  }
}

// ─── SCORING ──────────────────────────────────────────────────────────────────

async function collectAndScore(room) {
  const players = Object.keys(room.players || {});
  const letter = room.letter.toLowerCase();
  const answers = room.answers || {};

  const roundResults = {};
  const deltaScores = {};
  players.forEach(pid => { deltaScores[pid] = 0; });

  const toCheck = [];
  CATEGORIES.forEach(cat => {
    players.forEach(pid => {
      const ans = (answers[pid]?.[cat] || '').trim();
      if (ans.length >= 1) toCheck.push({ pid, cat, ans });
    });
  });

  // Egy kérésben ellenőriz mindent
  const checkResults = await checkAllWords(toCheck, letter);

  const normLetter = letter.normalize('NFD').replace(/[\u0300-\u036f]/g, '');

  CATEGORIES.forEach(cat => {
    roundResults[cat] = {};
    const catAnswers = {};
    players.forEach(pid => {
      const ans = (answers[pid]?.[cat] || '').trim();
      catAnswers[pid] = ans;
    });

    players.forEach(pid => {
      const ans = catAnswers[pid];
      const normAns = ans.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
      const result = checkResults[`${pid}__${cat}`];
      let pts = 0;
      let reason = '';
      if (!ans) {
        reason = 'üres';
      } else if (result && !result.valid) {
        reason = result.reason || 'érvénytelen';
      } else {
        const dupCount = players.filter(p => p !== pid && catAnswers[p].toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '') === normAns).length;
        pts = dupCount > 0 ? 5 : 10;
      }
      roundResults[cat][pid] = { answer: ans, pts, reason };
      deltaScores[pid] += pts;
    });
  });

  const newScores = {};
  players.forEach(pid => {
    newScores[pid] = (room.scores?.[pid] || 0) + deltaScores[pid];
  });

  const nextRound = room.round + 1;
  const isFinal = nextRound > MAX_ROUNDS;

  await update(roomRef, {
    roundResults,
    scores: newScores,
    status: isFinal ? 'final' : 'results'
  });
}

// ─── RESULTS ─────────────────────────────────────────────────────────────────

function showResults(room) {
  showScreen('resultsScreen');
  document.getElementById('resultsRoundTitle').textContent = `${room.round}. kör – ${room.letter} betű`;

  const scores = room.scores || {};
  const players = room.players || {};
  const scoreEl = document.getElementById('resultsScores');
  scoreEl.innerHTML = '';
  Object.entries(scores).sort((a,b) => b[1]-a[1]).forEach(([pid, sc]) => {
    const div = document.createElement('div');
    div.className = 'player-item';
    div.innerHTML = `<div class="player-dot"></div>
      <span class="player-name">${players[pid]?.name ?? pid}${pid===myId?' (te)':''}</span>
      <span class="player-score">${sc} pt</span>`;
    scoreEl.appendChild(div);
  });

  const results = room.roundResults || {};
  const listEl = document.getElementById('resultsList');
  listEl.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const catData = results[cat] || {};
    const div = document.createElement('div');
    div.className = 'result-cat';
    let answersHtml = '';
    Object.entries(catData).forEach(([pid, data]) => {
      const pts = data.pts;
      const cls = pts === 10 ? 'full' : pts === 5 ? 'half' : 'zero';
      const reasonText = pts === 0 && data.reason ? ` (${data.reason})` : '';
      answersHtml += `<div class="result-answer">
        <div>
          <span class="name">${players[pid]?.name ?? pid}: </span>
          <span>${data.answer || '–'}${reasonText ? `<span style="color:var(--red);font-size:0.75rem"> ${reasonText}</span>` : ''}</span>
        </div>
        <span class="pts ${cls}">${pts}pt</span>
      </div>`;
    });
    div.innerHTML = `<div class="result-cat-name">${cat}</div><div class="result-answers">${answersHtml}</div>`;
    listEl.appendChild(div);
  });

  const actionsEl = document.getElementById('resultsActions');
  actionsEl.innerHTML = '';

  if (isHost) {
    const btn = document.createElement('button');
    btn.className = 'btn btn-primary';
    const nextRound = room.round + 1;
    btn.textContent = `▶ ${nextRound}. kör indítása`;
    btn.onclick = nextRoundStart;
    actionsEl.appendChild(btn);
  } else {
    const p = document.createElement('p');
    p.className = 'status-msg amber';
    p.textContent = 'Várakozás a házigazdára...';
    actionsEl.appendChild(p);

    const fn = (snap) => {
      if (!snap.exists()) return;
      const r = snap.val();
      if (r.status === 'playing') {
        clearListeners();
        enterGame(r);
      }
      if (r.status === 'final') {
        clearListeners();
        showFinal(r);
      }
    };
    listen(roomRef, fn);
  }

  const leaveBtn = document.createElement('button');
  leaveBtn.className = 'btn btn-secondary';
  leaveBtn.textContent = '← Kilépés';
  leaveBtn.onclick = leaveRoom;
  actionsEl.appendChild(leaveBtn);
}

async function nextRoundStart() {
  const snap = await get(roomRef);
  const room = snap.val();
  const nextRound = room.round + 1;
  const recentLetters = room.usedLetters || [];
  const letter = getNextLetter(recentLetters);
  const newUsedLetters = [...recentLetters, letter].slice(-5);
  const startTime = Date.now() + 1000;

  const newRoom = {
    ...room,
    status: 'playing',
    round: nextRound,
    letter,
    startTime,
    stopped: null,
    stoppedBy: null,
    answers: null,
    roundResults: null,
    usedLetters: newUsedLetters
  };

  await update(roomRef, {
    status: 'playing',
    round: nextRound,
    letter,
    startTime,
    stopped: null,
    stoppedBy: null,
    answers: null,
    roundResults: null,
    usedLetters: newUsedLetters
  });

  clearListeners();
  enterGame(newRoom);
}

// ─── FINAL ────────────────────────────────────────────────────────────────────

function showFinal(room) {
  showScreen('finalScreen');
  const scores = room.scores || {};
  const players = room.players || {};
  const sorted = Object.entries(scores).sort((a,b) => b[1]-a[1]);
  const podium = document.getElementById('finalPodium');
  podium.innerHTML = '';
  const medals = ['🥇', '🥈', '🥉'];
  sorted.forEach(([pid, sc], i) => {
    const div = document.createElement('div');
    div.className = 'podium-item' + (i === 0 ? ' first' : '');
    div.innerHTML = `<span class="podium-rank">${medals[i] || (i+1)+'.'}</span>
      <span class="player-name">${players[pid]?.name ?? pid}${pid===myId?' (te)':''}</span>
      <span class="podium-score">${sc} pt</span>`;
    podium.appendChild(div);
  });
}

window.returnToMenu = async function() {
  clearListeners();
  if (roomRef && isHost) await remove(roomRef);
  roomRef = null; roomCode = null; isHost = false;
  showScreen('menuScreen');
};

  const statusEl = document.getElementById('apiKeyStatus');
  if (saved) {
    statusEl.textContent = '🔑 API kulcs mentve';

});

document.addEventListener('input', async (e) => {
  if (!e.target.classList.contains('category-input')) return;
  const cat = e.target.dataset.cat;
  const val = e.target.value;
  if (!roomRef || !myId) return;
  await update(ref(db, `rooms/${roomCode}/answers/${myId}`), { [cat]: val });
});
